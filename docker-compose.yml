name: akali

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-akali}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-akali}
      POSTGRES_DB: ${POSTGRES_DB:-akali}
    ports:
      # Host 5433 → container 5432, to avoid clashing with a local Postgres on 5432.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akali} -d ${POSTGRES_DB:-akali}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies Prisma migrations, then exits.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-akali}:${POSTGRES_PASSWORD:-akali}@postgres:5432/${POSTGRES_DB:-akali}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-akali}:${POSTGRES_PASSWORD:-akali}@postgres:5432/${POSTGRES_DB:-akali}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-akali}:${POSTGRES_PASSWORD:-akali}@postgres:5432/${POSTGRES_DB:-akali}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
